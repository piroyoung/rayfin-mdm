# Deploy the MDM Rayfin app to Microsoft Fabric.
#
# Auth: Azure OIDC (federated credentials — no long-lived secrets stored).
# The job signs in with `azure/login`, mints a Fabric access token with the
# Azure CLI, exposes it to the Rayfin CLI via RAYFIN_TOKEN, then runs
# `rayfin up` to deploy the data schema + static frontend.
#
# ─────────────────────────────────────────────────────────────────────────
# One-time setup required in your tenant / repo
# ─────────────────────────────────────────────────────────────────────────
# 1. Create an Entra ID app registration (service principal).
# 2. Add a **federated credential** to it for GitHub Actions:
#      Issuer:   https://token.actions.githubusercontent.com
#      Audience: api://AzureADTokenExchange
#      Subject:  repo:piroyoung/rayfin-mdm:ref:refs/heads/main
#    This subject matches pushes to `main` and manual runs on `main`.
#    (If you instead pin the deploy job to a GitHub Environment via
#     `environment: <name>`, the OIDC subject becomes
#     `repo:piroyoung/rayfin-mdm:environment:<name>` — register that subject.)
# 3. Grant the service principal **Member/Contributor** on the Fabric
#    workspace "rayfin-smec-championship", and ensure the tenant admin
#    setting "Service principals can use Fabric APIs" is enabled.
# 4. Add these GitHub **secrets** (Settings → Secrets and variables → Actions):
#      AZURE_CLIENT_ID        – app registration (client) ID
#      AZURE_TENANT_ID        – the tenant the service principal lives in
#      AZURE_SUBSCRIPTION_ID  – optional (any subscription the SP can read;
#                               omit and the job uses allow-no-subscriptions)
# 5. (Optional) override the deploy target with GitHub **variables**:
#      RAYFIN_WORKSPACE_ID    – defaults to the known workspace GUID below
#      RAYFIN_TENANT_ID       – Fabric tenant (ctid) for portal links

name: Deploy MDM to Fabric

on:
  push:
    branches: [main]
    paths:
      - 'mdm/**'
      - '.github/workflows/deploy-fabric.yml'
  pull_request:
    paths:
      - 'mdm/**'
      - '.github/workflows/deploy-fabric.yml'
  workflow_dispatch:
    inputs:
      force_schema:
        description: 'Allow destructive data-schema changes (passes --force to rayfin up)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # required for Azure OIDC login

concurrency:
  group: deploy-fabric-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: mdm

jobs:
  # ── Hermetic checks: no Azure credentials needed (also runs on PRs) ──────
  verify:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mdm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc -b && vite build)
        run: npm run build

      - name: Test
        run: npm test

  # ── Deploy to Fabric: only on push to main or manual dispatch ────────────
  deploy:
    name: rayfin up → Fabric
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RAYFIN_WORKSPACE_ID: ${{ vars.RAYFIN_WORKSPACE_ID || '54294be3-ba65-46fe-a3dd-33a916a15acc' }}
      RAYFIN_TENANT_ID: ${{ vars.RAYFIN_TENANT_ID || 'eecca864-7a91-4b48-9327-e19aa5cc3f35' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mdm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Acquire Fabric token → RAYFIN_TOKEN
        shell: bash
        run: |
          set -eo pipefail
          TOKEN=$(az account get-access-token \
            --resource https://api.fabric.microsoft.com \
            --query accessToken -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to acquire a Fabric access token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "RAYFIN_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy with rayfin up
        shell: bash
        env:
          FORCE_SCHEMA: ${{ github.event.inputs.force_schema }}
        run: |
          set -eo pipefail
          EXTRA=""
          if [ "$FORCE_SCHEMA" = "true" ]; then
            EXTRA="--force"
            echo "⚠️  Destructive schema changes enabled (--force)"
          fi
          # --yes auto-accepts reuse of the existing "mdm" app backend in the
          # target workspace (the local .deployments.json is gitignored, so
          # CI resolves the item by name on each run).
          npx rayfin up \
            --workspace-id "$RAYFIN_WORKSPACE_ID" \
            --tenant "$RAYFIN_TENANT_ID" \
            --yes $EXTRA 2>&1 | tee deploy.log

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          set -eo pipefail
          URL=$(grep -oE 'https://[a-z0-9-]+\.webapp[^ ]*' deploy.log | tail -1 || true)
          {
            echo "### ✅ MDM deployed to Fabric"
            echo ""
            echo "- Workspace ID: \`$RAYFIN_WORKSPACE_ID\`"
            if [ -n "$URL" ]; then echo "- Hosting URL: $URL"; fi
          } >> "$GITHUB_STEP_SUMMARY"
