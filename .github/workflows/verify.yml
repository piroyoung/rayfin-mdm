# Reusable verification workflow: lint, typecheck/build and test the MDM app.
# Called by ci.yml (every push/PR) and release.yml (before a Fabric deploy).
# No Azure credentials required — fully hermetic.
name: Verify

on:
  workflow_call:

defaults:
  run:
    working-directory: mdm

jobs:
  verify:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mdm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc -b && vite build)
        run: npm run build

      - name: Test
        run: npm test
